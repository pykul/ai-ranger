server {
    listen 8000;
    server_name _;

    # Dashboard (React SPA)
    location / {
        proxy_pass http://dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI — handle /api/docs separately so httpSwagger redirects
    # (e.g. /docs → /docs/) don't escape the /api prefix and land on the dashboard.
    location = /api/docs {
        return 301 /api/docs/;
    }
    location /api/docs/ {
        proxy_pass http://api-server:8081/docs/;
        proxy_redirect /docs/ /api/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Go Query API - strip /api prefix
    location /api/ {
        proxy_pass http://api-server:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI Gateway (agent ingest) - strip /ingest prefix
    location /ingest/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
