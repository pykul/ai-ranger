# Load user, exchange, queue, and binding definitions on startup.
#
# WARNING: When load_definitions is set, RabbitMQ skips creating the default
# user from RABBITMQ_DEFAULT_USER/RABBITMQ_DEFAULT_PASS env vars. All user
# credentials are controlled by definitions.json. If you change credentials,
# you must update BOTH definitions.json AND .env (which sets RABBITMQ_URL).
management.load_definitions = /etc/rabbitmq/definitions.json

# Allow the default user to connect from any host (required for Docker networking).
loopback_users = none
