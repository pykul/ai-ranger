basePath: /
definitions:
  github.com_pykul_ai-ranger_workers_internal_api.SettingsResponse:
    properties:
      org_id:
        type: string
      webhook_url:
        type: string
    type: object
  github.com_pykul_ai-ranger_workers_internal_api.SettingsUpdateRequest:
    properties:
      org_id:
        type: string
      webhook_url:
        type: string
    type: object
  github.com_pykul_ai-ranger_workers_internal_api.TokenCreateRequest:
    properties:
      label:
        type: string
      max_uses:
        type: integer
      org_id:
        type: string
    type: object
  github.com_pykul_ai-ranger_workers_internal_api.TokenCreateResponse:
    properties:
      id:
        type: string
      max_uses:
        type: integer
      org_id:
        type: string
      token:
        type: string
    type: object
  github.com_pykul_ai-ranger_workers_internal_api.healthResponse:
    properties:
      service:
        type: string
      status:
        type: string
    type: object
  internal_api.SettingsResponse:
    properties:
      org_id:
        type: string
      webhook_url:
        type: string
    type: object
  internal_api.SettingsUpdateRequest:
    properties:
      org_id:
        type: string
      webhook_url:
        type: string
    type: object
  internal_api.TokenCreateRequest:
    properties:
      label:
        type: string
      max_uses:
        type: integer
      org_id:
        type: string
    type: object
  internal_api.TokenCreateResponse:
    properties:
      id:
        type: string
      max_uses:
        type: integer
      org_id:
        type: string
