# Load exchange, queue, and binding topology on startup.
# See docker/rabbitmq/definitions.json for the full configuration.
# User credentials come from RABBITMQ_DEFAULT_USER/RABBITMQ_DEFAULT_PASS env vars.
management.load_definitions = /etc/rabbitmq/definitions.json

# Allow the default user to connect from any host (required for Docker networking).
loopback_users = none
