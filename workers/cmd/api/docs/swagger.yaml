        type: string
    type: object
  internal_api.healthResponse:
    properties:
      service:
        type: string
      status:
        type: string
    type: object
  store.FleetAgent:
    properties:
      agentVersion:
        type: string
      enrolledAt:
        type: string
      hostname:
        type: string
      id:
        description: generated on device
        type: string
      lastSeenAt:
        type: string
      orgID:
        type: string
      os:
        description: '"linux" | "macos" | "windows"'
        type: string
