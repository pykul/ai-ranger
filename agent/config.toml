# AI Ranger Agent Configuration
#
# This file works out of the box with no changes. The agent will capture
# AI provider connections and print JSON events to stdout.
#
# Place this file next to the agent binary, or pass --config /path/to/config.toml.
# See ARCHITECTURE.md § "Agent Configuration" for the full reference.

[agent]
# Capture mode: "dns-sni" (default) or "mitm" (Phase 5+, not yet implemented)
mode = "dns-sni"

# URL to fetch a fresh providers.toml on startup (optional).
# If set, the agent fetches this URL on every start and uses the result as
# the provider list. On failure, falls back to the local file in the config
# directory, then the compile-time bundled copy.
# providers_url = "https://raw.githubusercontent.com/pykul/ai-ranger/main/providers/providers.toml"

# ── Tuning parameters (all optional, defaults shown) ──────────────────────
#
# drain_interval_secs = 1           # How often the SQLite buffer uploads to the backend (seconds)
# drain_batch_size = 500            # Maximum events per upload batch
# http_batch_size = 10              # Maximum events buffered per HTTP sink flush
# webhook_batch_size = 100          # Default maximum events buffered per webhook sink flush
# providers_fetch_timeout_secs = 10 # Timeout for fetching providers.toml from URL
# max_buffer_events = 10000         # Max events in SQLite buffer before oldest are dropped
#
# The sink flush timer runs every 500ms and is not currently configurable.
# It ensures events reach the backend within 500ms even when the batch size
# threshold has not been reached.

# ── Output sinks ────────────────────────────────────────────────────────────
#
# Events fan out to all configured outputs simultaneously.
# At least one output must be present. If none are configured, stdout is used.

[[outputs]]
type = "stdout"

# Write JSON lines to a file. Each event is appended as one line.
# [[outputs]]
# type = "file"
# path = "/var/log/ai-ranger/events.jsonl"

# POST events to the AI Ranger backend gateway. Activates the local SQLite
# buffer - events are stored locally and uploaded every second.
# Requires enrollment (ai-ranger --enroll --token=... --backend=...).
# [[outputs]]
# type = "http"
# url = "https://your-instance.com/v1/ingest"
# token = "tok_abc123"

# POST JSON arrays to any HTTP endpoint. Useful for integrating with Datadog,
# Splunk, or custom webhooks without running the AI Ranger backend.
# [[outputs]]
# type = "webhook"
# url = "https://http-intake.logs.datadoghq.com/api/v2/logs"
# headers = { "DD-API-KEY" = "your-key", "Content-Type" = "application/json" }
# batch_size = 100
