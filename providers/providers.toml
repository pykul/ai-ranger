# AI Ranger - Community Provider Registry
#
# CONTRIBUTING: To add a provider, open a PR adding an entry below.
# Required fields: name, display_name, hostnames
# Please include a source link (docs_url) for any hostname you add.
#
# Hostnames are matched exactly and as subdomains (e.g. "eu.api.anthropic.com"
# matches "api.anthropic.com"). Trailing dots are stripped before matching.
#
# Optional: ip_ranges - CIDR ranges for providers with dedicated IP space.
# Used as a fallback when SNI and DNS detection both fail (e.g. browser ECH+DoH).
# Only add ip_ranges for providers with dedicated IPs. Do NOT add ranges for
# CDN-backed providers (Cloudflare, CloudFront, Azure CDN) - shared IPs cause
# false positives.

[[providers]]
name = "anthropic"
display_name = "Anthropic / Claude"
hostnames = ["api.anthropic.com", "claude.ai"]
ip_ranges = ["160.79.104.0/23", "2607:6bc0::/48"]
docs_url = "https://docs.anthropic.com"

