name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Agent (Rust) ──────────────────────────────────────────────────────────
  agent:
    name: Agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v${version}/protoc-${version}-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath "$env:RUNNER_TEMP\protoc"
          echo "$env:RUNNER_TEMP\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Format check
        if: runner.os == 'Linux'
        run: cargo fmt --check

      # ── Smoke tests ────────────────────────────────────────────────────
      # Start the agent, trigger AI provider traffic, verify JSON output.
      # Uses debug binary (already built by clippy/test) to avoid a slow
      # release compilation. Release builds are validated in release.yml.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/debug/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 3
          curl -s https://api.openai.com > /dev/null || true
          sleep 2
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q '"provider"' /tmp/ai-ranger-test.log

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/debug/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 3
          curl -s https://api.openai.com > /dev/null || true
          sleep 2
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q '"provider"' /tmp/ai-ranger-test.log

      - name: Verify Administrator privileges (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isAdmin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          Write-Host "Running as Administrator: $isAdmin"
          if (-not $isAdmin) { throw "SIO_RCVALL requires Administrator privileges" }

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process -FilePath "$env:GITHUB_WORKSPACE\target\debug\ai-ranger.exe" `
            -RedirectStandardOutput "C:\ai-ranger-test.log" `
            -RedirectStandardError "C:\ai-ranger-test-err.log" `
            -NoNewWindow
          Start-Sleep -Seconds 3
          curl.exe -s https://api.openai.com > $null 2>&1
          Start-Sleep -Seconds 2
          Stop-Process -Name "ai-ranger" -Force -ErrorAction SilentlyContinue
          Write-Host "--- agent log ---"
          Get-Content "C:\ai-ranger-test.log"
          Write-Host "--- agent errors ---"
          Get-Content "C:\ai-ranger-test-err.log"
          if (-not (Select-String -Path "C:\ai-ranger-test.log" -Pattern '"provider"' -Quiet)) {
            throw "No provider event detected in agent output"
          }

  # ── Proto generation ───────────────────────────────────────────────────
  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Install grpcio-tools
        run: pip install grpcio-tools

      - name: Run make proto
        run: make proto

      - name: Verify generated code is up to date
        run: git diff --exit-code proto/gen/

  # ── Gateway (Python) ─────────────────────────────────────────────────────
  gateway:
    name: Gateway
    needs: [proto]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app loads
        run: python -c "from main import app; print('Gateway app loaded OK')"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports

      # Gateway unit tests run here when gateway/tests/ exists.
      # Integration tests run in the separate integration-tests job.

  # ── Workers (Go) ─────────────────────────────────────────────────────────
  workers:
    name: Workers
    needs: [proto]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Test
        run: go test ./... -v

  # ── Docker Compose validate ──────────────────────────────────────────────
  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose --env-file .env -f docker/docker-compose.yml config --quiet

  # ── Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    needs: [gateway, workers, agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Run integration tests
        run: make test-integration

      - name: Cleanup
        if: always()
        run: docker compose --env-file .env -f docker/docker-compose.yml down -v

  # Windows agent detection (SIO_RCVALL + ETW DNS) is validated by the
  # agent job's smoke test on windows-latest. A separate Windows integration
  # test job was removed because the backend pipeline tests (Docker Compose
  # with Postgres, ClickHouse, RabbitMQ) do not test anything Windows-specific.
  # Those Linux containers run identically regardless of the host OS. The only
  # Windows-specific code is the agent's capture path, which the smoke test
  # already covers.

  # ── Dashboard (React/TypeScript) ─────────────────────────────────────────
  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
