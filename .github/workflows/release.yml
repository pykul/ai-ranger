name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: ai-ranger
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: ai-ranger
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: ai-ranger
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: ai-ranger
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: ai-ranger.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v${version}/protoc-${version}-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath "$env:RUNNER_TEMP\protoc"
          echo "$env:RUNNER_TEMP\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # aarch64-linux cross-compilation needs a cross-linker
      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (Linux cross)
        if: matrix.cross
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ai-ranger-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ai-ranger-${{ matrix.target }}.zip

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ai-ranger-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ai-ranger-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          sha256sum ai-ranger-*.tar.gz ai-ranger-*.zip > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            Download the binary for your platform and run it. No dependencies required.

            See the [production deployment guide](https://github.com/pykul/ai-ranger#production-deployment) for full setup instructions.

            ## Verify

            After downloading, verify the checksum:

            ```bash
            sha256sum -c checksums.txt --ignore-missing
            ```

            ## What changed

            See the [full changelog](https://github.com/pykul/ai-ranger/commits/${{ github.ref_name }}) for details.
          files: |
            artifacts/ai-ranger-*.tar.gz
            artifacts/ai-ranger-*.zip
            artifacts/checksums.txt
