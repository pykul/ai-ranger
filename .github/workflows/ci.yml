name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Agent (Rust) ──────────────────────────────────────────────────────────
  agent:
    name: Agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc -y

      - name: Build
        run: cargo build

      - name: Build release (for smoke test)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        if: runner.os == 'Linux'
        run: cargo fmt --check

      # ── Smoke tests ────────────────────────────────────────────────────
      # Start the agent, trigger AI provider traffic, verify JSON output.
      # Linux and Windows should work reliably with root/Administrator on
      # GitHub-hosted runners. macOS BPF access may be restricted by the
      # runner environment - failure there does not indicate an agent bug.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/release/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 3
          curl -s https://api.openai.com > /dev/null || true
          sleep 2
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q '"provider"' /tmp/ai-ranger-test.log

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/release/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 3
          curl -s https://api.openai.com > /dev/null || true
          sleep 2
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q '"provider"' /tmp/ai-ranger-test.log

      - name: Verify Administrator privileges (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isAdmin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          Write-Host "Running as Administrator: $isAdmin"
          if (-not $isAdmin) { throw "SIO_RCVALL requires Administrator privileges" }

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process -FilePath "$env:GITHUB_WORKSPACE\target\release\ai-ranger.exe" `
            -RedirectStandardOutput "C:\ai-ranger-test.log" `
            -RedirectStandardError "C:\ai-ranger-test-err.log" `
            -NoNewWindow
          Start-Sleep -Seconds 3
          curl.exe -s https://api.openai.com > $null 2>&1
          Start-Sleep -Seconds 2
          Stop-Process -Name "ai-ranger" -Force -ErrorAction SilentlyContinue
          Write-Host "--- agent log ---"
          Get-Content "C:\ai-ranger-test.log"
          Write-Host "--- agent errors ---"
          Get-Content "C:\ai-ranger-test-err.log"
          if (-not (Select-String -Path "C:\ai-ranger-test.log" -Pattern '"provider"' -Quiet)) {
            throw "No provider event detected in agent output"
          }

  # ── Proto generation ───────────────────────────────────────────────────
  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Install grpcio-tools
        run: pip install grpcio-tools

      - name: Run make proto
        run: make proto

      - name: Verify generated code is up to date
        run: git diff --exit-code proto/gen/

  # ── Gateway (Python) ─────────────────────────────────────────────────────
  gateway:
    name: Gateway
    needs: [proto]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app loads
        run: python -c "from main import app; print('Gateway app loaded OK')"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      # Gateway unit tests run here when gateway/tests/ exists.
      # Integration tests run in the separate integration-tests job.

  # ── Workers (Go) ─────────────────────────────────────────────────────────
  workers:
    name: Workers
    needs: [proto]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...
        continue-on-error: true

      - name: Test
        run: go test ./... -v

  # ── Docker Compose validate ──────────────────────────────────────────────
  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose --env-file .env -f docker/docker-compose.yml config --quiet

  # ── Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    needs: [gateway, workers, agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Create .env from example
        run: cp .env.example .env

      - name: Start Docker Compose stack
        run: |
          cd docker
          docker compose --env-file ../.env up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 45); do
            GW=$(curl -sf http://localhost:8080/health 2>/dev/null || true)
            API=$(curl -sf http://localhost:8081/health 2>/dev/null || true)
            if echo "$GW" | grep -q '"ok"' && echo "$API" | grep -q '"ok"'; then
              echo "All services healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy"
          docker compose --env-file .env -f docker/docker-compose.yml ps
          docker compose --env-file .env -f docker/docker-compose.yml logs
          exit 1

      - name: Build agent binary
        run: cargo build --release --manifest-path agent/Cargo.toml

      - name: Install test dependencies
        run: pip install -r tests/integration/requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -m "not network"
        env:
          AGENT_BINARY: target/release/ai-ranger

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker compose --env-file ../.env down -v

  # ── Dashboard (React/TypeScript) ─────────────────────────────────────────
