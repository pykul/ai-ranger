name: CI

on:
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Agent (Rust) ──────────────────────────────────────────────────────────
  agent:
    name: Agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Build
        run: cargo build

      - name: Build release (for smoke test)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        if: runner.os == 'Linux'
        run: cargo fmt --check

      # ── Smoke tests ────────────────────────────────────────────────────
      # Start the agent, trigger AI provider traffic, verify JSON output.
      # Linux and Windows should work reliably with root/Administrator on
      # GitHub-hosted runners. macOS BPF access may be restricted by the
      # runner environment — failure there does not indicate an agent bug.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/release/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 3
          curl -s https://api.openai.com > /dev/null || true
          sleep 2
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q '"provider"' /tmp/ai-ranger-test.log

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        # Verifies the agent can start and open a BPF device for capture.
        # Provider detection is not asserted because macOS BPF on CI runners
        # does not reliably see outgoing traffic from the same machine.
        # Detection correctness is covered by the Linux smoke test.
        run: |
          echo "Running as: $(whoami)"
          BINARY="${GITHUB_WORKSPACE}/target/release/ai-ranger"
          ls -la "$BINARY"
          /usr/bin/sudo "$BINARY" > /tmp/ai-ranger-test.log 2>&1 &
          sleep 5
          /usr/bin/sudo pkill ai-ranger || true
          echo "--- agent log ---"
          cat /tmp/ai-ranger-test.log
          grep -q 'Capturing on' /tmp/ai-ranger-test.log

      - name: Verify Administrator privileges (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isAdmin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          Write-Host "Running as Administrator: $isAdmin"
          if (-not $isAdmin) { throw "SIO_RCVALL requires Administrator privileges" }

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process -FilePath "$env:GITHUB_WORKSPACE\target\release\ai-ranger.exe" `
            -RedirectStandardOutput "C:\ai-ranger-test.log" `
            -RedirectStandardError "C:\ai-ranger-test-err.log" `
            -NoNewWindow
          Start-Sleep -Seconds 3
          curl.exe -s https://api.openai.com > $null 2>&1
          Start-Sleep -Seconds 2
          Stop-Process -Name "ai-ranger" -Force -ErrorAction SilentlyContinue
          Write-Host "--- agent log ---"
          Get-Content "C:\ai-ranger-test.log"
          Write-Host "--- agent errors ---"
          Get-Content "C:\ai-ranger-test-err.log"
          if (-not (Select-String -Path "C:\ai-ranger-test.log" -Pattern '"provider"' -Quiet)) {
            throw "No provider event detected in agent output"
          }

  # ── Gateway (Python) ─────────────────────────────────────────────────────
