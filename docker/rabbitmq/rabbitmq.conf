# Load user, exchange, queue, and binding definitions on startup.
# definitions.json is generated from definitions.json.template by the custom
# entrypoint script using envsubst. Credentials are controlled entirely by
# RABBITMQ_DEFAULT_USER and RABBITMQ_DEFAULT_PASS environment variables.
management.load_definitions = /etc/rabbitmq/definitions.json

# Allow the default user to connect from any host (required for Docker networking).
loopback_users = none
